<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title> Logar na Conta </title>
    
    </head>

    <body class="cadastro">
        <header>
            <nav>
            <a href="index.html">Home</a>
            <a href="equipe.html">Equipe</a>
            <a href="sobrenos.html">Sobre Nós</a>
            <a href="cadastrodados.html">cadastro/login</a>
            </nav>
        </header>
        <div class="container">
            <div class="form-image">
                <img src="undraw_check-boxes_x5fg.svg">
            </div>
            <div class="form">
                <form action="#">
                    <div class="form-header">
                        <div class="title">
                            <h1>Login</h1>
                        </div>
                        <div class="conta-button">
                            <button><a href="cadastrodados.html">Não possuo Login</a></button>
                        </div>
                    </div>
                        
                    <div class="input-group">
                       
                        <div class="input-box">
                            <label for="email">E-mail</label>
                            <input id="email" type="email" name="email" placeholder="Digite seu E-mail" required>
                        </div>
                            
                        <div class="input-box">
                            <label for="password">Senha</label>
                            <input id="password" type="password" name="password" placeholder="Digite sua senha" required>
                        </div>
                            
                    </div>

                    <div class="gender-inputs">
                        <div class="gender-title">
                            <h6>Você é um ROBO??????</h6>
                        </div>
                            
                        <div class="gender-group">
                            <div class="gender-input">
                                <input type="radio" id="female" name="gender">
                                <label for="female">Sim</label>
                            </div>
                                
                            <div class="gender-input">
                                <input type="radio" id="male" name="gender">
                                <label for="male">Não</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="cadastrar-button">
                        <button><a href="#">Entrar</a></button>
                    </div>
                </form>
            </div>
        </div>
    </body>

</html>
